<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Контакти туристичного сайту Стрия">
    <meta name="keywords" content="Стрий, контакти, форма, карта">
    <meta name="author" content="Студент">
    <title>Контакти</title>
    <link rel="stylesheet" href="style.css">
</head>

<body id="top">
    <header class="site-header">
        <h1 class="site-header__title">Контакти</h1>
        <p class="site-header__text">Форма зворотного зв’язку та карта міста</p>

        <nav class="nav">
            <ul class="nav__list">
                <li class="nav__item"><a class="nav__link" href="index.html">Головна</a></li>
                <li class="nav__item"><a class="nav__link" href="places.html">Цікаві місця</a></li>
                <li class="nav__item"><a class="nav__link" href="route.html">Маршрут</a></li>
                <li class="nav__item"><a class="nav__link" href="contacts.html">Контакти</a></li>
            </ul>
        </nav>
    </header>

    <div class="fixed-badge">Контакт</div>

    <main class="contact-grid">
        <section class="contact-grid__form card">
            <h2 class="card__title">Зворотний зв’язок</h2>

            <form action="#" method="post" class="form">
                <label class="form__label" for="name">Ім’я:</label>
                <input class="form__field" type="text" id="name" name="name" required maxlength="40">

                <label class="form__label" for="email">Email:</label>
                <input class="form__field" type="email" id="email" name="email" required>

                <label class="form__label" for="phone">Телефон:</label>
                <input class="form__field" type="tel" id="phone" name="phone" pattern="[0-9+() -]{10,20}" required>

                <label class="form__label" for="site">Сайт:</label>
                <input class="form__field" type="url" id="site" name="site">

                <label class="form__label" for="date">Дата поїздки:</label>
                <input class="form__field" type="datetime-local" id="date" name="date" required>

                <label class="form__label" for="message">Повідомлення:</label>
                <textarea class="form__field form__field_textarea" id="message" name="message" rows="6" maxlength="350"
                    required></textarea>

                <button class="form__button" type="submit">Надіслати</button>
                <button class="form__button form__button_reset" type="reset">Очистити</button>
            </form>
        </section>

        <section class="contact-grid__map card">
            <h2 class="card__title">Карта міста</h2>

            <iframe class="map"
                src="https://www.openstreetmap.org/export/embed.html?bbox=23.819%2C49.245%2C23.880%2C49.275&amp;layer=mapnik"
                title="Карта міста Стрий">
            </iframe>
        </section>

        <aside class="contact-grid__aside aside">
            <h2 class="aside__title">Інформація</h2>
            <p class="aside__text"><strong>Місто:</strong> Стрий</p>
            <p class="aside__text"><strong>Область:</strong> Львівська область</p>
            <p class="aside__text"><strong>Email:</strong> stryj-tour@example.com</p>
        </aside>
    </main>

    <footer class="footer">
        <p class="footer__text">
            <a href="index.html">На головну</a> |
            <a href="#top">До початку сторінки</a>
        </p>
    </footer>
</body>

</html>
